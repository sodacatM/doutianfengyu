<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>产业布局 - 豆田丰语</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --white: #ffffff;
      --soft-white: rgba(255, 255, 255, 0.88);
      --muted-white: rgba(255, 255, 255, 0.72);
      --line: rgba(255, 255, 255, 0.18);
      --card-bg: rgba(16, 53, 48, 0.58);
      --card-bg-2: rgba(255, 255, 255, 0.10);
      --accent: #f1d65c;
      --blue: #59a8f5;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--white);
    }

    body {
      position: relative;
      min-height: 100vh;
      padding: 28px 22px 36px;
      overflow-x: hidden;
      background-color: #0d302b;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(7, 24, 21, 0.26), rgba(7, 24, 21, 0.38)),
        url("c.jpg") no-repeat center center;
      background-size: cover;
      z-index: -3;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.12), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(241,214,92,0.18), transparent 24%),
        linear-gradient(to bottom, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      z-index: -2;
      pointer-events: none;
    }

    .page {
      max-width: 1360px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: center;
      margin-bottom: 26px;
    }

    .title-pill {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      padding: 18px 42px;
      border-radius: 999px;
      color: var(--white);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(
        135deg,
        rgba(0, 19, 18, 0.88),
        rgba(6, 49, 45, 0.72)
      );
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 28px rgba(0,0,0,0.24);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .title-dot {
      color: var(--accent);
      font-size: 24px;
      line-height: 1;
    }

    .main-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 28px;
      align-items: stretch;
    }

    .card {
      position: relative;
      min-height: 640px;
      padding: 34px 28px 28px;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05)),
        var(--card-bg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.02) 28%,
        rgba(255,255,255,0.01) 70%
      );
      pointer-events: none;
    }

    .card-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
    }

    .title-icon {
      font-size: 24px;
      line-height: 1;
    }

    .city-name {
      margin: 6px 0 8px;
      font-size: 28px;
      line-height: 1.35;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.18);
    }

    .park-name {
      margin-bottom: 28px;
      font-size: 16px;
      color: rgba(255,255,255,0.74);
    }

    .info-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 28px;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--soft-white);
    }

    .info-item .bullet {
      flex-shrink: 0;
      width: 22px;
      text-align: center;
      font-size: 14px;
      margin-top: 2px;
    }

    .image-box {
      margin-top: auto;
      width: 100%;
      height: 180px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      background-color: rgba(255,255,255,0.06);
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tag {
      width: 100%;
      text-align: center;
      margin-bottom: 28px;
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.92);
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
    }

    .check-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 28px;
    }

    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 15px;
      line-height: 1.75;
      color: var(--soft-white);
    }

    .check-icon {
      width: 23px;
      height: 23px;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 6px 14px rgba(89, 168, 245, 0.24);
      margin-top: 2px;
    }

    .channel-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .channel-card {
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .channel-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .channel-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.68);
      line-height: 1.6;
    }

    @media (max-width: 1100px) {
      .main-grid {
        grid-template-columns: 1fr;
        max-width: 760px;
        margin: 0 auto;
      }

      .card {
        min-height: auto;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 20px 14px 28px;
      }

      .title-pill {
        padding: 14px 24px;
        font-size: 22px;
        gap: 12px;
      }

      .main-grid {
        gap: 20px;
      }

      .card {
        padding: 24px 18px 20px;
        border-radius: 24px;
      }

      .card-title {
        font-size: 20px;
        margin-bottom: 22px;
      }

      .city-name {
        font-size: 24px;
      }

      .image-box {
        height: 160px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title-pill">
        <span>📍</span>
        <span>产业布局</span>
        <span class="title-dot">●</span>
        <span>实力背书</span>
      </div>
    </div>

    <div class="main-grid">
      <section class="card">
        <div class="card-content">
          <div class="card-title">
            <span class="title-icon">🌱</span>
            <span>上游基地</span>
          </div>

          <div class="city-name">江西省九江市湖口县</div>
          <div class="park-name">流芳豆文化产业园</div>

          <div class="info-list">
            <div class="info-item">
              <span class="bullet">🌱</span>
              <span>340亩标准化非转基因大豆种植基地</span>
            </div>
            <div class="info-item">
              <span class="bullet">🌱</span>
              <span>2.6万㎡综合楼和标准厂房</span>
            </div>
            <div class="info-item">
              <span class="bullet">🌱</span>
              <span>中国工程院院士盖钧镒领衔，亩产263.2公斤</span>
            </div>
          </div>

          <div class="image-box">
            <img src="c1.jpg" alt="上游基地图片" />
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-content">
          <div class="card-title">
            <span class="title-icon">🏗️</span>
            <span>中游生产</span>
          </div>

          <div class="tag">轻资产代工模式</div>

          <div class="check-list">
            <div class="check-item">
              <span class="check-icon">✓</span>
              <span>SC食品生产资质合作工厂</span>
            </div>
            <div class="check-item">
              <span class="check-icon">✓</span>
              <span>十万级无菌车间</span>
            </div>
            <div class="check-item">
              <span class="check-icon">✓</span>
              <span>HACCP危害分析控制体系</span>
            </div>
            <div class="check-item">
              <span class="check-icon">✓</span>
              <span>精准锁定五大核心生产节点</span>
            </div>
          </div>

          <div class="image-box">
            <img src="c2.jpg" alt="中游生产图片" />
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-content">
          <div class="card-title">
            <span class="title-icon">🛒</span>
            <span>下游渠道</span>
          </div>

          <div class="tag">全渠道销售体系</div>

          <div class="channel-list">
            <div class="channel-card">
              <div class="channel-name">📱 直播电商</div>
              <div class="channel-sub">抖音、快手、视频号</div>
            </div>

            <div class="channel-card">
              <div class="channel-name">🛍️ 传统电商</div>
              <div class="channel-sub">天猫、京东、拼多多</div>
            </div>

            <div class="channel-card">
              <div class="channel-name">💊 连锁药店</div>
              <div class="channel-sub">老百姓、大参林、益丰</div>
            </div>

            <div class="channel-card">
              <div class="channel-name">🏪 商超便利店</div>
              <div class="channel-sub">永辉、大润发、盒马</div>
            </div>

            <div class="channel-card">
              <div class="channel-name">🎁 农文旅体验店</div>
              <div class="channel-sub">黑龙江、河南等地</div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
