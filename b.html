<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>产业布局 - 豆田丰语</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 60px 20px;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      color: #ffffff;
    }

    /* 本地背景图 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("c.jpg") no-repeat center center;
      background-size: cover;
      z-index: -2;
    }

    /* 轻遮罩，避免背景太花影响阅读 */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.10);
      z-index: -1;
    }

    .header {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 50px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(60, 60, 60, 0.45);
      padding: 12px 40px;
      border-radius: 50px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18);
      color: #ffffff;
      text-align: center;
    }

    .header .dot {
      color: #F6E05E;
    }

    .main-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 360px));
      gap: 30px;
      max-width: 1250px;
      width: 100%;
      justify-content: center;
      align-items: stretch;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 35px 25px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      color: #2D3748; /* 关键：卡片内统一改为深色文字 */
    }

    .card-content {
      flex-grow: 1;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #1A202C;
    }

    .city-name {
      color: #D4AF37;
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .park-name {
      font-size: 15px;
      margin-bottom: 25px;
      color: #4A5568;
      opacity: 1;
    }

    .list-item {
      font-size: 15px;
      line-height: 1.75;
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
      color: #2D3748;
    }

    .list-item::before {
      content: "🌱";
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bottom-img {
      width: 100%;
      height: 160px;
      background-size: cover;
      background-position: center;
      border-radius: 18px;
      margin-top: 20px;
      overflow: hidden;
    }

    /* 改为本地图片，放在仓库同级目录 */
    .img-upstream {
      background-image: url("c1.jpg");
    }

    .img-midstream {
      background-image: url("c2.jpg");
    }

    .subtitle-tag {
      text-align: center;
      font-size: 15px;
      margin-bottom: 25px;
      background: rgba(72, 187, 120, 0.10);
      color: #2F855A;
      padding: 8px 10px;
      border-radius: 10px;
      font-weight: 600;
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 18px;
      font-size: 15px;
      color: #2D3748;
      line-height: 1.7;
    }

    .check-box {
      background: #4299E1;
      color: #ffffff;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .channel-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .channel-item {
      background: rgba(72, 187, 120, 0.08);
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
      border: 1px solid rgba(72, 187, 120, 0.12);
    }

    .channel-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
      color: #1A202C;
    }

    .channel-sub {
      font-size: 12px;
      color: #4A5568;
      opacity: 1;
    }

    @media (max-width: 1150px) {
      .main-grid {
        grid-template-columns: 1fr;
        max-width: 520px;
      }

      body {
        padding: 40px 16px;
      }

      .header {
        font-size: 26px;
        padding: 12px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="header">📍 产业布局 <span class="dot">·</span> 实力背书</div>

  <div class="main-grid">
    <div class="glass-card">
      <div class="card-content">
        <div class="card-title">🌱 上游基地</div>
        <div class="city-name">江西省九江市湖口县</div>
        <div class="park-name">流芳豆文化产业园</div>
        <div class="list-item">340亩标准化非转基因大豆种植基地</div>
        <div class="list-item">2.6万㎡综合楼和标准厂房</div>
        <div class="list-item">中国工程院院士盖钧镒领衔，亩产263.2公斤</div>
      </div>
      <div class="bottom-img img-upstream"></div>
    </div>

    <div class="glass-card">
      <div class="card-content">
        <div class="card-title">🏗️ 中游生产</div>
        <div class="subtitle-tag">轻资产代工模式</div>
        <div class="check-row">
          <div class="check-box">✓</div>
          <span>SC食品生产资质合作工厂</span>
        </div>
        <div class="check-row">
          <div class="check-box">✓</div>
          <span>十万级无菌车间</span>
        </div>
        <div class="check-row">
          <div class="check-box">✓</div>
          <span>HACCP危害分析控制体系</span>
        </div>
        <div class="check-row">
          <div class="check-box">✓</div>
          <span>精准锁定五大核心生产节点</span>
        </div>
      </div>
      <div class="bottom-img img-midstream"></div>
    </div>

    <div class="glass-card">
      <div class="card-content">
        <div class="card-title">🛒 下游渠道</div>
        <div class="subtitle-tag">全渠道销售体系</div>
        <div class="channel-stack">
          <div class="channel-item">
            <div class="channel-name">📱直播电商</div>
            <div class="channel-sub">抖音、快手、视频号</div>
          </div>
          <div class="channel-item">
            <div class="channel-name">🛒传统电商</div>
            <div class="channel-sub">天猫、京东、拼多多</div>
          </div>
          <div class="channel-item">
            <div class="channel-name">💊连锁药店</div>
            <div class="channel-sub">老百姓、大参林、益丰</div>
          </div>
          <div class="channel-item">
            <div class="channel-name">🏪商超便利店</div>
            <div class="channel-sub">永辉、大润发、盒马</div>
          </div>
          <div class="channel-item">
            <div class="channel-name">🎁农文旅体验店</div>
            <div class="channel-sub">黑龙江、河南等地</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
