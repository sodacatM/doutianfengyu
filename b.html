<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产业布局 - 豆田丰语</title>
  <style>
    /* 1. 核心背景 */
    body {
      margin: 0;
      padding: 60px 20px;
      background: url('https://www.imgur.la/images/2026/03/23/image4e21baf44560ebb1.png') no-repeat center center fixed;
      background-size: cover;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* 2. 标题层级 */
    .header {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 50px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(0, 0, 0, 0.4); 
      padding: 12px 40px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
    
    .header .dot { color: #F6E05E; }

    /* 3. 三栏栅格布局 - 使用 align-items: stretch 确保等高 */
    .main-grid {
      display: grid;
      grid-template-columns: repeat(3, 360px);
      gap: 30px;
      max-width: 1250px;
      align-items: stretch; 
    }

    /* 4. 毛玻璃卡片 */
    .glass-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 35px 25px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      /* 去掉了 min-height，让内容决定高度 */
    }

    /* 内部容器，用于撑开空间让图片触底 */
    .card-content {
      flex-grow: 1; 
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .city-name {
      color: #F6E05E;
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 5px;
    }
    .park-name {
      font-size: 15px;
      margin-bottom: 25px;
      opacity: 0.8;
    }
    .list-item {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
    }
    .list-item::before { content: "🌱"; font-size: 12px; }
    
    /* 底部图片样式 */
    .bottom-img {
      width: 100%;
      height: 160px; /* 适当调矮一点，更精致 */
      background-size: cover;
      background-position: center;
      border-radius: 18px;
      margin-top: 20px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0));
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0));
    }

    .img-upstream { background-image: url('https://www.imgur.la/images/2026/03/23/imageb6289ad9f83ab35c.png'); }
    .img-midstream { background-image: url('https://www.imgur.la/images/2026/03/23/imageaee0ad5058c53240.png'); }

    .subtitle-tag {
      text-align: center;
      font-size: 16px;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.1);
      padding: 6px;
      border-radius: 10px;
    }
    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 18px;
      font-size: 14px;
    }
    .check-box {
      background: #4299E1;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .channel-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .channel-item {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .channel-name { font-weight: bold; font-size: 15px; margin-bottom: 2px; }
    .channel-sub { font-size: 11px; opacity: 0.6; }

    @media (max-width: 1150px) {
      .main-grid { grid-template-columns: 1fr; }
      body { padding: 40px 20px; }
    }
  </style>
</head>
<body>

  <div class="header">📍 产业布局 <span class="dot">·</span> 实力背书</div>

  <div class="main-grid">
    
    <div class="glass-card">
      <div class="card-content">
        <div class="card-title">🌱 上游基地</div>
        <div class="city-name">江西省九江市湖口县</div>
        <div class="park-name">流芳豆文化产业园</div>
        <div class="list-item">340亩标准化非转基因大豆种植基地</div>
        <div class="list-item">2.6万㎡综合楼和标准厂房</div>
        <div class="list-item">中国工程院院士盖钧镒领衔，亩产263.2公斤</div>
      </div>
      <div class="bottom-img img-upstream"></div>
    </div>

    <div class="glass-card">
      <div class="card-content">
        <div class="card-title">🏗️ 中游生产</div>
        <div class="subtitle-tag">轻资产代工模式</div>
        <div class="check-row">
          <div class="check-box">✓</div>
          <span>SC食品生产资质合作工厂</span>
        </div>
        <div class="check-row">
          <div class="check-box">✓</div>
          <span>十万级无菌车间</span>
        </div>
        <div class="check-row">
          <div class="check-box">✓</div>
          <span>HACCP危害分析控制体系</span>
        </div>
        <div class="check-row">
          <div class="check-box">✓</div>
          <span>精准锁定五大核心生产节点</span>
        </div>
      </div>
      <div class="bottom-img img-midstream"></div>
    </div>

    <div class="glass-card">
      <div class="card-content">
        <div class="card-title">🛒 下游渠道</div>
        <div class="subtitle-tag">全渠道销售体系</div>
        <div class="channel-stack">
          <div class="channel-item">
            <div class="channel-name">📱直播电商</div>
            <div class="channel-sub">抖音、快手、视频号</div>
          </div>
          <div class="channel-item">
            <div class="channel-name">🛒传统电商</div>
            <div class="channel-sub">天猫、京东、拼多多</div>
          </div>
          <div class="channel-item">
            <div class="channel-name">💊连锁药店</div>
            <div class="channel-sub">老百姓、大参林、益丰</div>
          </div>
          <div class="channel-item">
            <div class="channel-name">🏪商超便利店</div>
            <div class="channel-sub">永辉、大润发、盒马</div>
          </div>
          <div class="channel-item">
            <div class="channel-name">🎁农文旅体验店</div>
            <div class="channel-sub">黑龙江、河南等地</div>
          </div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
