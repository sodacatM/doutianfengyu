<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>豆田丰语官网 - 专业农业服务平台</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      position: relative;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      background-color: #e9f2ea;
    }

    /* 背景层：使用本地图片，取消 fixed 提升加载和渲染速度 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("a.jpg") no-repeat center center;
      background-size: cover;
      z-index: -2;
    }

    /* 轻量遮罩层：保证文字清晰，同时比模糊更省性能 */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.18);
      z-index: -1;
    }

    .company-intro {
      width: 100%;
      max-width: 900px;
      padding: 60px 40px;
      text-align: center;
      border-radius: 36px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.14);
    }

    .intro-title {
      display: inline-block;
      margin: 0;
      font-size: 32px;
      font-weight: 800;
      color: #1a202c;
      letter-spacing: 2px;
      position: relative;
    }

    .intro-title::after {
      content: "";
      display: block;
      width: 42px;
      height: 4px;
      margin: 12px auto 0;
      border-radius: 4px;
      background: #48bb78;
    }

    .intro-content {
      max-width: 650px;
      margin: 24px auto 40px;
      font-size: 16px;
      line-height: 1.9;
      color: #2d3748;
      font-weight: 500;
    }

    .intro-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .intro-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      padding: 22px 8px;
      border-radius: 20px;
      text-decoration: none;
      border: none;
      background: rgba(255, 255, 255, 0.96);
      color: #1a202c;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, color 0.25s ease;
    }

    .intro-btn:hover {
      transform: translateY(-6px);
      background: #48bb78;
      color: #ffffff;
      box-shadow: 0 14px 28px rgba(72, 187, 120, 0.22);
    }

    .intro-btn::before {
      font-size: 30px;
      margin-bottom: 12px;
      line-height: 1;
    }

    .intro-btn:nth-child(1)::before {
      content: "🏢";
    }

    .intro-btn:nth-child(2)::before {
      content: "🌐";
    }

    .intro-btn:nth-child(3)::before {
      content: "🛠️";
    }

    .intro-btn:nth-child(4)::before {
      content: "✉️";
    }

    @media (max-width: 768px) {
      body {
        padding: 16px;
      }

      .company-intro {
        padding: 40px 18px;
        border-radius: 28px;
      }

      .intro-title {
        font-size: 26px;
        letter-spacing: 1px;
      }

      .intro-content {
        font-size: 15px;
        margin: 20px auto 32px;
      }

      .intro-buttons {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .intro-btn {
        min-height: 104px;
        padding: 18px 6px;
        font-size: 14px;
      }

      .intro-btn::before {
        font-size: 26px;
        margin-bottom: 10px;
      }
    }

    @media (max-width: 480px) {
      .intro-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <section class="company-intro">
    <h2 class="intro-title">关于豆田丰语</h2>

    <div class="intro-content">
      豆田丰语致力于为广大农户提供优质的种植方案、农资推荐和技术指导，<br />
      助力农业丰产增收，推动乡村振兴发展。
    </div>

    <div class="intro-buttons">
      <a href="a.html" class="intro-btn">公司介绍</a>
      <a href="b.html" class="intro-btn">产业布局</a>
      <a href="c.html" class="intro-btn">产品服务</a>
      <a href="d.html" class="intro-btn">关于我们</a>
    </div>
  </section>
</body>
</html>
