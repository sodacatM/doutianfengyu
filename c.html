<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>核心产品 - 豆田丰语</title>
  <style>
    /* --- 1. 基础背景 --- */
    body {
      margin: 0;
      background: url('d.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .content-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 35px;
      padding: 40px;
      width: 100%;
      max-width: 1200px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.1);
    }

    .back-btn {
      display: inline-block;
      text-decoration: none;
      color: #2F855A;
      font-weight: bold;
      margin-bottom: 20px;
      transition: 0.3s;
    }
    .back-btn:hover { transform: translateX(-5px); }

    .section-header { text-align: center; margin-bottom: 30px; }
    .section-header h1 { font-size: 32px; color: #2D3748; display: flex; align-items: center; justify-content: center; gap: 10px; }
    
    .green-banner { background: #276749; color: white; padding: 30px; border-radius: 20px; margin-bottom: 50px; text-align: center; }
    .green-banner h2 { margin: 0 0 10px 0; font-size: 26px; letter-spacing: 2px; }
    .green-banner p { margin: 0; opacity: 0.9; font-size: 16px; }

    .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
    
    .product-card { 
      background: white; 
      border-radius: 25px; 
      padding: 30px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
      display: flex; 
      flex-direction: column; 
      position: relative; 
      transition: 0.3s; 
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

    .tag { position: absolute; top: 20px; right: 20px; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: white; font-weight: bold; }
    .tag-hot { background: #E53E3E; }
    .tag-gift { background: #F56565; }

    .product-img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 20px; }

    .product-info h3 { font-size: 19px; color: #2D3748; margin: 10px 0; }
    .product-info .spec { color: #A0AEC0; font-size: 14px; margin-bottom: 8px; }
    .product-info .price { color: #38A169; font-size: 26px; font-weight: bold; margin-bottom: 12px; }
    .product-info .scene { font-size: 13px; color: #718096; margin-bottom: 15px; line-height: 1.5; }
    
    .feature-list {
      list-style: none;
      padding: 0;
      margin: 0 0 25px 0;
      font-size: 14px;
      color: #4A5568;
      line-height: 2;
      flex-grow: 1;
    }
    .feature-list li::before { content: "✓ "; color: #38A169; font-weight: bold; }

    .buy-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
    .btn-green { background: #38A169; }
    .btn-gold { background: #D69E2E; }
    .btn-red { background: #E53E3E; }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .modal-content {
      background: white;
      width: 95%;
      max-width: 500px;
      border-radius: 25px;
      padding: 30px;
      box-sizing: border-box;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .modal-title {
      color: #1A5336;
      font-size: 24px;
      text-align: center;
      margin-bottom: 25px;
      font-weight: bold;
    }

    .form-group { margin-bottom: 15px; text-align: left; }
    .form-label { display: block; margin-bottom: 6px; font-size: 14px; color: #4A5568; font-weight: 500; }
    .form-label span { color: #E53E3E; margin-left: 2px; }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #E2E8F0;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
    }
    .form-textarea { height: 80px; resize: none; }

    .modal-actions { display: flex; gap: 12px; margin-top: 25px; }
    .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-cancel { background: #D1D5DB; color: #374151; }
    .btn-submit { background: #22C55E; color: white; }

    @media (max-width: 900px) { .product-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
