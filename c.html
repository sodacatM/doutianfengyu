<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>核心产品 - 豆田丰语</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* ✅ 背景层（关键） */
    .bg {
      position: fixed;
      inset: 0;
      background: url('d.jpg') no-repeat center center;
      background-size: cover;
      z-index: -2;
    }

    /* 遮罩 */
    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
    }

    .content-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 35px;
      padding: 40px;
      width: 100%;
      max-width: 1200px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.15);
      position: relative;
      z-index: 1;
    }

    .back-btn {
      text-decoration: none;
      color: #2F855A;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .section-header h1 {
      font-size: 32px;
      color: #2D3748;
    }

    .green-banner {
      background: #276749;
      color: white;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 50px;
      text-align: center;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    .product-card {
      background: white;
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
    }

    .product-img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      margin-bottom: 20px;
    }

    .product-info h3 {
      font-size: 18px;
      color: #2D3748;
    }

    .price {
      color: #38A169;
      font-size: 24px;
      font-weight: bold;
    }

    @media (max-width: 900px) {
      .product-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- 背景层 -->
  <div class="bg"></div>

  <!-- 内容 -->
  <div class="content-card">
    <a href="index.html" class="back-btn">← 返回首页</a>

    <div class="section-header">
      <h1>核心产品</h1>
    </div>

    <div class="green-banner">
      <h2>无褪黑素 · 无成瘾性</h2>
      <p>科学助眠解决方案</p>
    </div>

    <div class="product-grid">
      <div class="product-card">
        <img src="c1.jpg" class="product-img">
        <div class="product-info">
          <h3>便携条装</h3>
          <p class="price">¥99</p>
        </div>
      </div>

      <div class="product-card">
        <img src="c2.jpg" class="product-img">
        <div class="product-info">
          <h3>家庭瓶装</h3>
          <p class="price">¥199</p>
        </div>
      </div>

      <div class="product-card">
        <img src="c3.jpg" class="product-img">
        <div class="product-info">
          <h3>礼盒装</h3>
          <p class="price">¥368</p>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
